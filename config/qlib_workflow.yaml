qlib_init:
  provider_uri: "./qlib_data"
  region: cn

market: &market all
benchmark: &benchmark SH000300

data_handler_config: &data_handler_config
  start_time: 2020-01-01
  end_time:   2026-04-20
  fit_start_time: 2020-01-01
  fit_end_time:   2024-12-31
  instruments: *market
  infer_processors:
    - class: RobustZScoreNorm
      kwargs:
        fields_group: feature
        clip_outlier: true
    - class: Fillna
      kwargs:
        fields_group: feature
  learn_processors:
    - class: DropnaLabel
    - class: CSRankNorm
      kwargs:
        fields_group: label
  label: ["Ref($close, -6)/Ref($close, -1) - 1"]   # 5日未来收益, -1避免未来函数

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 20
      n_drop: 5
  backtest:
    start_time: 2025-01-01
    end_time:   2026-04-20
    account: 1000000
    benchmark: *benchmark
    exchange_kwargs:
      limit_threshold: 0.095           # 涨跌停阈值
      deal_price: close
      open_cost: 0.00055               # 买入 佣金+过户费
      close_cost: 0.00155              # 卖出 佣金+印花税
      min_cost: 5
      trade_unit: 100

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.02
      subsample: 0.88
      lambda_l1: 205
      lambda_l2: 580
      max_depth: 8
      num_leaves: 210
      num_threads: 20
      verbosity: -1
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: AshareAlphaHandler
        module_path: factors.alpha_ashare
        kwargs: *data_handler_config
      segments:
        train: [2020-01-01, 2023-12-31]
        valid: [2024-01-01, 2024-12-31]
        test:  [2025-01-01, 2026-04-20]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        model: <MODEL>
        dataset: <DATASET>
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        ana_long_short: false
        ann_scaler: 252
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
